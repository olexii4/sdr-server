##### sdr-server config for MSi SDR (MSi2500 VID:1df7 PID:2500) #####
bind_address="127.0.0.1"
port=8090
read_timeout_seconds=5

buffer_size=262144
queue_size=64
lpf_cutoff_rate=5
use_gzip=false
cpu_optimization="NATIVE_CF32"

# band: 2.048 Msps centred on 100 MHz (FM broadcast band)
band_sampling_rate=2048000

sdr_type=3          # MSi SDR
device_index=0

##### MSi SDR settings #####
msisdr_gain=50       # 0..102 dB
msisdr_gain_mode=1   # 1=manual
msisdr_if_freq=0     # zero-IF
msisdr_bandwidth=0   # 8 MHz auto
msisdr_hw_flavour=0  # standard MSi2500
